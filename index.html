```html
<!-- ================= CSS TAMBAHAN ================= -->
<style>

/* ===== PAGE SLIDE SYSTEM ===== */
.page-section{
    display:none;
    opacity:0;
    transform:translateX(40px);
    transition:
        opacity .45s ease,
        transform .45s ease;
}

.page-section.active-page{
    display:block;
    opacity:1;
    transform:translateX(0);
    animation:pageFade .45s ease;
}

@keyframes pageFade{
    from{
        opacity:0;
        transform:translateX(30px);
    }
    to{
        opacity:1;
        transform:translateX(0);
    }
}

/* ===== ACTIVE MENU ===== */
.sidebar-nav a{
    position:relative;
}

.sidebar-nav a.active{
    background:linear-gradient(
        135deg,
        rgba(26,140,255,.16),
        rgba(108,92,231,.16)
    );
    border:1px solid rgba(26,140,255,.18);
    box-shadow:
        0 0 18px rgba(26,140,255,.18),
        inset 0 0 12px rgba(255,255,255,.02);
}

/* ===== SMOOTH HOVER ===== */
.menu-card,
.price-card,
.contact-item,
.test-bot-box{
    transition:
        transform .35s ease,
        box-shadow .35s ease,
        border-color .35s ease,
        background .35s ease;
}

/* ===== LOADING EFFECT ===== */
.page-loader{
    position:fixed;
    inset:0;
    background:#0b0e1a;
    z-index:99999;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    gap:16px;
    transition:.5s ease;
}

.page-loader.hide{
    opacity:0;
    visibility:hidden;
}

.loader-ring{
    width:58px;
    height:58px;
    border-radius:50%;
    border:4px solid rgba(255,255,255,.08);
    border-top-color:#1a8cff;
    animation:spin 1s linear infinite;
}

@keyframes spin{
    to{
        transform:rotate(360deg);
    }
}

.loader-text{
    color:#8892b0;
    font-size:.95rem;
    letter-spacing:1px;
}

/* ===== MOBILE FIX ===== */
@media(max-width:820px){

    .page-section.active-page{
        animation:mobileSlide .35s ease;
    }

    @keyframes mobileSlide{
        from{
            opacity:0;
            transform:translateY(15px);
        }
        to{
            opacity:1;
            transform:translateY(0);
        }
    }

}

</style>


<!-- ================= LOADER ================= -->
<div class="page-loader" id="pageLoader">
    <div class="loader-ring"></div>
    <div class="loader-text">Loading Er-Shop...</div>
</div>


<!-- ================= GANTI SEMUA SECTION MENJADI INI ================= -->

<section id="quickMenu" class="page-section active-page">

<section id="prices" class="page-section">

<section id="test-bot" class="page-section">

<section id="contact" class="page-section">

<section id="payment" class="page-section">


<!-- ================= JAVASCRIPT BARU ================= -->
<script>

(function(){

'use strict';

/* ================= SIDEBAR ================= */

const sidebar = document.getElementById('sidebar');
const overlay = document.getElementById('sidebarOverlay');
const toggle = document.getElementById('sidebarToggle');

function toggleSidebar(){
    sidebar.classList.toggle('open');
    overlay.classList.toggle('active');
}

toggle.addEventListener('click',toggleSidebar);
overlay.addEventListener('click',toggleSidebar);


/* ================= LOADER ================= */

window.addEventListener('load',function(){

    setTimeout(()=>{
        document
        .getElementById('pageLoader')
        .classList.add('hide');
    },700);

});


/* ================= PAGE SYSTEM ================= */

const sections =
document.querySelectorAll('.page-section');

const navLinks =
document.querySelectorAll('.sidebar-nav a');

function showPage(id){

    sections.forEach(section=>{

        section.classList.remove('active-page');

        setTimeout(()=>{
            if(!section.classList.contains('active-page')){
                section.style.display='none';
            }
        },300);

    });

    const target = document.querySelector(id);

    if(target){

        target.style.display='block';

        setTimeout(()=>{
            target.classList.add('active-page');
        },50);

    }

}


/* ================= SIDEBAR CLICK ================= */

navLinks.forEach(link=>{

    link.addEventListener('click',function(e){

        e.preventDefault();

        navLinks.forEach(l=>
            l.classList.remove('active')
        );

        this.classList.add('active');

        const target =
        this.getAttribute('href');

        showPage(target);

        window.scrollTo({
            top:0,
            behavior:'smooth'
        });

        if(window.innerWidth <= 820){
            sidebar.classList.remove('open');
            overlay.classList.remove('active');
        }

    });

});


/* ================= MENU BUTTON ================= */

document
.querySelectorAll('[data-scroll]')
.forEach(btn=>{

    btn.addEventListener('click',function(){

        const targetId =
        this.getAttribute('data-scroll');

        showPage('#prices');

        navLinks.forEach(l=>
            l.classList.remove('active')
        );

        const hargaMenu =
        document.querySelector(
            '.sidebar-nav a[href="#prices"]'
        );

        if(hargaMenu){
            hargaMenu.classList.add('active');
        }

        setTimeout(()=>{

            const target =
            document.getElementById(targetId);

            if(target){

                target.scrollIntoView({
                    behavior:'smooth',
                    block:'start'
                });

                target.style.transition='.3s';
                target.style.color='#1a8cff';

                setTimeout(()=>{
                    target.style.color='';
                },1000);

            }

        },250);

    });

});


/* ================= MODAL EFFECT ================= */

const modal =
document.getElementById('modal');

const qrisModal =
document.getElementById('qrisModal');

[modal,qrisModal].forEach(m=>{

    if(!m) return;

    m.addEventListener('click',function(e){

        if(e.target === this){

            this.classList.remove('open');
            document.body.style.overflow='';

        }

    });

});


/* ================= SMOOTH PAGE FEEL ================= */

document.querySelectorAll(
'.menu-card, .price-card, .contact-item'
).forEach(card=>{

    card.addEventListener('mouseenter',()=>{

        card.style.transform='translateY(-6px)';

    });

    card.addEventListener('mouseleave',()=>{

        card.style.transform='';

    });

});

})();
</script>
